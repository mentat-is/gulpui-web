name: ci

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: read

env:
  DOCKER_REPOSITORY: mentatis
  DOCKER_IMAGE_NAME: gulp-web

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Validate release tag
        id: release
        run: |
          git fetch origin master --tags --force
          tag_commit="$(git rev-list -n 1 "${GITHUB_REF_NAME}")"

          if ! git merge-base --is-ancestor "${tag_commit}" origin/master; then
            echo "Tag ${GITHUB_REF_NAME} does not point to a commit contained in origin/master."
            exit 1
          fi

          echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Install deps
        run: |
          export PATH="$HOME/.local/share/pnpm:$PATH"
          pnpm install --frozen-lockfile

      - name: Build
        env:
          APP_VERSION: ${{ steps.release.outputs.version }}
        run: |
          export PATH="$HOME/.local/share/pnpm:$PATH"
          pnpm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker meta
        id: meta
        run: |
          V="${{ steps.release.outputs.version }}"
          echo "tag=${{ env.DOCKER_REPOSITORY }}/${{ env.DOCKER_IMAGE_NAME }}:${V}" >> "$GITHUB_OUTPUT"
          echo "latest=${{ env.DOCKER_REPOSITORY }}/${{ env.DOCKER_IMAGE_NAME }}:latest" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            _VERSION=${{ steps.release.outputs.version }}
          tags: |
            ${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.latest }}
          no-cache: true
