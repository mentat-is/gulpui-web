name: ci

on:
  push:
    branches:
      - "**"
    tags-ignore:
      - "**"

permissions:
  contents: write

env:
  DOCKER_REPOSITORY: mentatis
  DOCKER_IMAGE_NAME: gulp-web

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Ensure VERSION
        run: |
          test -f VERSION || echo "1.0" > VERSION
          cat VERSION

      - name: Compute and tag version (no push yet)
        id: rel
        env:
          PUSH_TAGS: "0"
        run: |
          v="$(bash scripts/release.sh)"
          echo "version=${v}" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Enable corepack and activate pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9 --activate
          pnpm --version

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build
        env:
          APP_VERSION: ${{ steps.rel.outputs.version }}
        run: pnpm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker meta
        id: meta
        run: |
          V="${{ steps.rel.outputs.version }}"
          echo "tag=${{ env.DOCKER_REPOSITORY }}/${{ env.DOCKER_IMAGE_NAME }}:${V}" >> "$GITHUB_OUTPUT"
          echo "latest=${{ env.DOCKER_REPOSITORY }}/${{ env.DOCKER_IMAGE_NAME }}:latest" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            _VERSION=${{ steps.rel.outputs.version }}
          tags: |
            ${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.latest }}
          no-cache: true

      - name: Push tag
        run: git push --tags
        continue-on-error: true
